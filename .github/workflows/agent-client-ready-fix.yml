name: Client Ready Final Installer Retry
run-name: Client-ready final installer retry - ${{ github.sha }}

on:
  push:
    branches:
      - agent/client-ready-release

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: agent/client-ready-release

      - name: Fix Rust query lifetimes
        shell: pwsh
        run: |
          $path = 'src-tauri/src/lib.rs'
          $content = Get-Content $path -Raw
          $oldServices = @'
              stmt.query_map(params![visit_id], row_to_visit_service)
                  .map_err(|err| err.to_string())?
                  .collect::<Result<Vec<_>, _>>()
                  .map_err(|err| err.to_string())
          '@
          $newServices = @'
              let items = stmt
                  .query_map(params![visit_id], row_to_visit_service)
                  .map_err(|err| err.to_string())?
                  .collect::<Result<Vec<_>, _>>()
                  .map_err(|err| err.to_string())?;
              Ok(items)
          '@
          $oldAttachments = @'
              stmt.query_map(params![client_id], row_to_attachment)
                  .map_err(|err| err.to_string())?
                  .collect::<Result<Vec<_>, _>>()
                  .map_err(|err| err.to_string())
          '@
          $newAttachments = @'
              let items = stmt
                  .query_map(params![client_id], row_to_attachment)
                  .map_err(|err| err.to_string())?
                  .collect::<Result<Vec<_>, _>>()
                  .map_err(|err| err.to_string())?;
              Ok(items)
          '@
          $content = $content.Replace($oldServices.Trim(), $newServices.Trim()).Replace($oldAttachments.Trim(), $newAttachments.Trim())
          [IO.File]::WriteAllText($path, $content, [Text.UTF8Encoding]::new($false))
          if ((Get-FileHash $path -Algorithm SHA256).Hash.ToLower() -ne '56bf890ad9632b7c3c21cecd6079e3543b2e8649b803a526b9eaf86261b9afff') { throw 'Rust lifetime patch verification failed.' }
          Remove-Item '.github/workflows/agent-client-ready-fix.yml' -Force

      - name: Commit compile fix
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix Rust query lifetimes'
          git push origin HEAD:agent/client-ready-release

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri installer
        run: npx tauri build --bundles nsis

      - name: Prepare client package
        shell: pwsh
        run: |
          $releaseDir = Join-Path $pwd 'release-usb'
          $bundleDir = Join-Path $pwd 'src-tauri\target\release\bundle\nsis'
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          $setup = Get-ChildItem -Path $bundleDir -Filter '*.exe' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $setup) { throw 'NSIS setup EXE was not found.' }
          Copy-Item $setup.FullName (Join-Path $releaseDir 'Dietoy-Client-Ready-Setup.exe') -Force
          Copy-Item $setup.FullName (Join-Path $releaseDir 'Dietoy-Setup.exe') -Force
          Copy-Item 'installer\Customer-Install.vbs' (Join-Path $releaseDir 'INSTALL.vbs') -Force
          Copy-Item 'installer\Customer-Install-Silent.vbs' (Join-Path $releaseDir 'INSTALL-SILENT.vbs') -Force
          Copy-Item 'installer\README-USB.txt' $releaseDir -Force
          'branch=agent/client-ready-release' | Out-File (Join-Path $releaseDir 'BUILD-INFO.txt') -Encoding utf8
          "source_commit=$(git rev-parse HEAD)" | Out-File (Join-Path $releaseDir 'BUILD-INFO.txt') -Encoding utf8 -Append

      - name: Upload client-ready artifact
        uses: actions/upload-artifact@v4
        with:
          name: dietoy-client-ready-release-usb
          path: release-usb
