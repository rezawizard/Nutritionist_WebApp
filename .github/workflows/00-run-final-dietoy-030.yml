name: 00 RUN THIS NOW - FINAL DIETOY 0.3.0
run-name: FINAL DIETOY 0.3.0 · ${{ github.ref_name }} · ${{ github.sha }}

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build FINAL Dietoy 0.3.0 installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Show source commit
        shell: pwsh
        run: |
          git rev-parse HEAD
          git branch --show-current

      - name: Patch Rust E0597 lifetime issue
        shell: pwsh
        run: |
          $path = "src-tauri\src\lib.rs"
          $content = Get-Content $path -Raw
          $oldServices = @'
fn list_visit_services(state: tauri::State<'_, AppState>, visit_id: i64) -> Result<Vec<VisitService>, String> {
    let conn = state.conn.lock().map_err(|err| err.to_string())?;
    let mut stmt = conn
        .prepare("SELECT id, visit_id, service_id, service_name_snapshot, body_area, device_name, duration_minutes, price, quantity, total, notes FROM visit_services WHERE visit_id=?1 ORDER BY id ASC")
        .map_err(|err| err.to_string())?;
    stmt.query_map(params![visit_id], row_to_visit_service)
        .map_err(|err| err.to_string())?
        .collect::<Result<Vec<_>, _>>()
        .map_err(|err| err.to_string())
}
'@
          $newServices = @'
fn list_visit_services(state: tauri::State<'_, AppState>, visit_id: i64) -> Result<Vec<VisitService>, String> {
    let conn = state.conn.lock().map_err(|err| err.to_string())?;
    let mut stmt = conn
        .prepare("SELECT id, visit_id, service_id, service_name_snapshot, body_area, device_name, duration_minutes, price, quantity, total, notes FROM visit_services WHERE visit_id=?1 ORDER BY id ASC")
        .map_err(|err| err.to_string())?;
    let items = stmt
        .query_map(params![visit_id], row_to_visit_service)
        .map_err(|err| err.to_string())?
        .collect::<Result<Vec<_>, _>>()
        .map_err(|err| err.to_string())?;
    Ok(items)
}
'@
          $oldAttachments = @'
fn list_client_attachments(state: tauri::State<'_, AppState>, client_id: i64) -> Result<Vec<Attachment>, String> {
    let conn = state.conn.lock().map_err(|err| err.to_string())?;
    let mut stmt = conn
        .prepare("SELECT id, client_id, visit_id, category, title, file_name, local_path, attachment_date, notes, created_at FROM attachments WHERE client_id=?1 ORDER BY attachment_date DESC, id DESC")
        .map_err(|err| err.to_string())?;
    stmt.query_map(params![client_id], row_to_attachment)
        .map_err(|err| err.to_string())?
        .collect::<Result<Vec<_>, _>>()
        .map_err(|err| err.to_string())
}
'@
          $newAttachments = @'
fn list_client_attachments(state: tauri::State<'_, AppState>, client_id: i64) -> Result<Vec<Attachment>, String> {
    let conn = state.conn.lock().map_err(|err| err.to_string())?;
    let mut stmt = conn
        .prepare("SELECT id, client_id, visit_id, category, title, file_name, local_path, attachment_date, notes, created_at FROM attachments WHERE client_id=?1 ORDER BY attachment_date DESC, id DESC")
        .map_err(|err| err.to_string())?;
    let items = stmt
        .query_map(params![client_id], row_to_attachment)
        .map_err(|err| err.to_string())?
        .collect::<Result<Vec<_>, _>>()
        .map_err(|err| err.to_string())?;
    Ok(items)
}
'@
          $content = $content.Replace($oldServices, $newServices).Replace($oldAttachments, $newAttachments)
          Set-Content -Path $path -Value $content -Encoding UTF8

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build Tauri installer
        run: npx tauri build --bundles nsis

      - name: Prepare final USB package
        shell: pwsh
        run: |
          $releaseDir = Join-Path $pwd "release-usb"
          $bundleDir = Join-Path $pwd "src-tauri\target\release\bundle\nsis"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          $setup = Get-ChildItem -Path $bundleDir -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $setup) {
            if (Test-Path $bundleDir) { Get-ChildItem -Path $bundleDir -Recurse }
            throw "NSIS setup EXE was not found."
          }
          Copy-Item $setup.FullName (Join-Path $releaseDir "Dietoy-FINAL-0.3.0-Setup.exe") -Force
          Copy-Item $setup.FullName (Join-Path $releaseDir "Dietoy-Setup.exe") -Force
          Copy-Item "installer\Customer-Install.vbs" (Join-Path $releaseDir "INSTALL.vbs") -Force
          Copy-Item "installer\Customer-Install-Silent.vbs" (Join-Path $releaseDir "INSTALL-SILENT.vbs") -Force
          Copy-Item "installer\README-USB.txt" $releaseDir -Force
          "workflow=00 RUN THIS NOW - FINAL DIETOY 0.3.0" | Out-File (Join-Path $releaseDir "BUILD-INFO.txt") -Encoding utf8
          "branch=${{ github.ref_name }}" | Out-File (Join-Path $releaseDir "BUILD-INFO.txt") -Encoding utf8 -Append
          "commit=${{ github.sha }}" | Out-File (Join-Path $releaseDir "BUILD-INFO.txt") -Encoding utf8 -Append
          "version=0.3.0" | Out-File (Join-Path $releaseDir "BUILD-INFO.txt") -Encoding utf8 -Append
          Get-ChildItem $releaseDir

      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: dietoy-RUN-THIS-final-0.3.0-release-usb
          path: release-usb
