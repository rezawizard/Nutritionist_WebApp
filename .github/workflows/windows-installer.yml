name: USE THIS - Dietory 5.2.0 Final Installer
run-name: USE THIS - Dietory 5.2.0 Final Installer · ${{ github.ref_name }} · ${{ github.sha }}

on:
  workflow_dispatch:

concurrency:
  group: dietory-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Dietory 5.2.0 customer package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Show project files and commit
        shell: pwsh
        run: |
          git rev-parse HEAD
          git branch --show-current
          node --version
          npm --version
          Get-ChildItem -Force
          Get-ChildItem src-tauri -Force
          Get-ChildItem installer -Force

      - name: Configure npm network retries
        shell: pwsh
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-timeout 300000
          npm config set registry https://registry.npmjs.org/

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Build frontend
        run: npm run build

      - name: Build Tauri installer
        run: npx tauri build --bundles nsis

      - name: Prepare USB package
        shell: pwsh
        run: |
          $releaseDir = Join-Path $pwd "release-usb"
          $bundleDir = Join-Path $pwd "src-tauri\target\release\bundle\nsis"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          $setup = Get-ChildItem -Path $bundleDir -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $setup) {
            if (Test-Path $bundleDir) { Get-ChildItem -Path $bundleDir -Recurse }
            throw "NSIS setup EXE was not found."
          }
          Copy-Item $setup.FullName (Join-Path $releaseDir "Dietory-5.2.0-Setup.exe") -Force
          Copy-Item "installer\Customer-Install.vbs" (Join-Path $releaseDir "INSTALL.vbs") -Force
          Copy-Item "installer\Customer-Install-Silent.vbs" (Join-Path $releaseDir "INSTALL-SILENT.vbs") -Force
          Copy-Item "installer\README-USB.txt" $releaseDir -Force

          $guidePath = Join-Path $pwd "docs\Dietory_User_Guide_FA.pdf"
          if (Test-Path $guidePath) {
            Copy-Item $guidePath (Join-Path $releaseDir "Dietory-Guide-FA.pdf") -Force
            Write-Host "Persian user guide added to the artifact."
          } else {
            Write-Warning "docs\Dietory_User_Guide_FA.pdf was not found. The installer artifact will be created without the guide PDF."
          }

          "branch=${{ github.ref_name }}" | Out-File (Join-Path $releaseDir "BUILD-INFO.txt") -Encoding utf8
          "commit=${{ github.sha }}" | Out-File (Join-Path $releaseDir "BUILD-INFO.txt") -Encoding utf8 -Append
          "version=5.2.0" | Out-File (Join-Path $releaseDir "BUILD-INFO.txt") -Encoding utf8 -Append
          Get-ChildItem $releaseDir

      - name: Upload release-usb artifact
        uses: actions/upload-artifact@v4
        with:
          name: dietory-5.2.0-release
          path: release-usb
