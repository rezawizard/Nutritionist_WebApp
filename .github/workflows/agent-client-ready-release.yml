name: Client Ready Final Installer
run-name: Client-ready final installer - ${{ github.sha }}

on:
  push:
    branches:
      - agent/client-ready-release

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: agent/client-ready-release

      - name: Apply verified release files
        shell: pwsh
        run: |
          function Expand-Payload([string[]]$Parts, [string]$Target) {
            $encoded = ($Parts | ForEach-Object { Get-Content $_ -Raw }) -join ""
            $compressed = [Convert]::FromBase64String($encoded)
            $input = [IO.MemoryStream]::new($compressed)
            $gzip = [IO.Compression.GZipStream]::new($input, [IO.Compression.CompressionMode]::Decompress)
            $output = [IO.File]::Create($Target)
            $gzip.CopyTo($output)
            $output.Dispose()
            $gzip.Dispose()
            $input.Dispose()
          }
          Expand-Payload @('.codex-release/app-00.txt', '.codex-release/app-01.txt', '.codex-release/app-02.txt', '.codex-release/app-03.txt') 'src/App.tsx'
          Expand-Payload @('.codex-release/rust-00.txt', '.codex-release/rust-01.txt') 'src-tauri/src/lib.rs'
          Expand-Payload @('.codex-release/polish-00.txt') 'src/deliveryPolish.ts'
          if ((Get-FileHash 'src/App.tsx' -Algorithm SHA256).Hash.ToLower() -ne '9feeeb02a7c8109429c0f03ed5372ca6bfd4c2e1728051298d0c4cb9ec38694a') { throw 'App payload verification failed.' }
          if ((Get-FileHash 'src-tauri/src/lib.rs' -Algorithm SHA256).Hash.ToLower() -ne '85236b526b4bfe2aaa3b425a375a332bd8a7bcf7e1c8c64656c861b44d925158') { throw 'Rust payload verification failed.' }
          if ((Get-FileHash 'src/deliveryPolish.ts' -Algorithm SHA256).Hash.ToLower() -ne 'da79851820943cae224fc749315e63b807760310c1d5bab914058ce73ee8abc2') { throw 'Polish payload verification failed.' }
          Remove-Item '.codex-release' -Recurse -Force
          Remove-Item '.github/workflows/agent-client-ready-release.yml' -Force

      - name: Commit final source
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Prepare client-ready release'
          git push origin HEAD:agent/client-ready-release

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri installer
        run: npx tauri build --bundles nsis

      - name: Prepare client package
        shell: pwsh
        run: |
          $releaseDir = Join-Path $pwd 'release-usb'
          $bundleDir = Join-Path $pwd 'src-tauri\target\release\bundle\nsis'
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          $setup = Get-ChildItem -Path $bundleDir -Filter '*.exe' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $setup) { throw 'NSIS setup EXE was not found.' }
          Copy-Item $setup.FullName (Join-Path $releaseDir 'Dietoy-Client-Ready-Setup.exe') -Force
          Copy-Item $setup.FullName (Join-Path $releaseDir 'Dietoy-Setup.exe') -Force
          Copy-Item 'installer\Customer-Install.vbs' (Join-Path $releaseDir 'INSTALL.vbs') -Force
          Copy-Item 'installer\Customer-Install-Silent.vbs' (Join-Path $releaseDir 'INSTALL-SILENT.vbs') -Force
          Copy-Item 'installer\README-USB.txt' $releaseDir -Force
          'branch=agent/client-ready-release' | Out-File (Join-Path $releaseDir 'BUILD-INFO.txt') -Encoding utf8
          "source_commit=$(git rev-parse HEAD)" | Out-File (Join-Path $releaseDir 'BUILD-INFO.txt') -Encoding utf8 -Append

      - name: Upload client-ready artifact
        uses: actions/upload-artifact@v4
        with:
          name: dietoy-client-ready-release-usb
          path: release-usb
