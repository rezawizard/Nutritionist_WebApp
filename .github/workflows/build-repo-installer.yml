name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    name: Build release-usb package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate app icons
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Add-Type -AssemblyName System.Drawing
          New-Item -ItemType Directory -Force -Path "src-tauri\icons" | Out-Null
          $size = 256
          $bmp = New-Object System.Drawing.Bitmap $size, $size
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::AntiAlias
          $g.Clear([System.Drawing.Color]::Transparent)
          $brush = New-Object System.Drawing.SolidBrush ([System.Drawing.ColorTranslator]::FromHtml("#0f5b46"))
          $g.FillEllipse($brush, 18, 18, 220, 220)
          $pen = New-Object System.Drawing.Pen ([System.Drawing.ColorTranslator]::FromHtml("#f7f3ea"), 13)
          $g.DrawArc($pen, 62, 58, 132, 126, 205, 225)
          $g.DrawLine($pen, 128, 67, 128, 190)
          $g.DrawArc($pen, 88, 96, 96, 78, 40, 250)
          $bmp.Save("src-tauri\icons\icon.png", [System.Drawing.Imaging.ImageFormat]::Png)
          $icon = [System.Drawing.Icon]::FromHandle($bmp.GetHicon())
          $stream = [System.IO.File]::Create("src-tauri\icons\icon.ico")
          $icon.Save($stream)
          $stream.Close()
          $g.Dispose(); $brush.Dispose(); $pen.Dispose(); $bmp.Dispose(); $icon.Dispose()

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri installer
        run: npm run tauri:build

      - name: Prepare USB package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $releaseDir = Join-Path $pwd "release-usb"
          $bundleDir = Join-Path $pwd "src-tauri\target\release\bundle\nsis"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          $setup = Get-ChildItem -Path $bundleDir -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $setup) { throw "NSIS setup EXE was not found." }
          Copy-Item $setup.FullName (Join-Path $releaseDir "MatabTaghzieh-Setup.exe") -Force
          Copy-Item "installer\Customer-Install.vbs" (Join-Path $releaseDir "INSTALL.vbs") -Force
          Copy-Item "installer\Customer-Install-Silent.vbs" (Join-Path $releaseDir "INSTALL-SILENT.vbs") -Force
          Copy-Item "installer\README-USB.txt" $releaseDir -Force

      - name: Upload release-usb artifact
        uses: actions/upload-artifact@v4
        with:
          name: matab-taghzieh-release-usb
          path: release-usb

